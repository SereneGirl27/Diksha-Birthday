<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div class="background">

        <div class="gradient gradient-left"></div>
        <div class="gradient gradient-right"></div>

        <canvas id="particles"></canvas>

    </div>

    <!-- Intro Screen -->
    <section id="intro">

        <p id="introText">
            Today isn't just another day.
        </p>

    </section>

    <!-- Main Screen -->
    <section id="hero">

        <div class="title-container">

            <h1 id="title">

                <span>HAPPY</span>
                <span>BIRTHDAY</span>

            </h1>

            <div class="shine"></div>

        </div>

        <p class="subtitle">
            to the girl who unknowingly made countless ordinary moments unforgettable.
        </p>

        <button id="beginButton">
            BEGIN →
        </button>

    </section>

    <!-- Mouse Glow -->
    <div id="cursorGlow"></div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
